# Windows distributables: portable .exe + NSIS installer.
# Output: release/

appId: dev.openclaw.desktop
productName: OpenClaw Desktop
executableName: OpenClaw Desktop
directories:
  output: release

publish:
  provider: github
  owner: Mankhb2k
  repo: openclaw-desktop

# Place a 256x256 .ico at assets/icon.ico (already copied from upstream).
icon: assets/icon.ico

# --- ASAR: PHẢI GIỮ false ---
# asar: true + asarUnpack đã được thử nghiệm và KHÔNG HOẠT ĐỘNG với openclaw vì:
#   - openclaw dùng ES module (import.meta.url)
#   - Kể cả khi asarUnpack, import.meta.url vẫn trả về "app.asar/..." (không phải app.asar.unpacked/)
#   - openBoundaryFileSync gọi fs.openSync(O_NOFOLLOW) với ASAR virtual path → crash
#   - Error: "Unable to open bundled plugin public surface ollama/runtime-api.js"
# Giải pháp thay thế để giảm kích thước: dùng exclusions bên dưới.
asar: false

files:
  - dist/**/*
  - assets/icon.ico
  - package.json
  - scripts/hoist-openclaw-ext-deps.mjs
  - node_modules/**/*
  - "!**/*.map"
  - "!node_modules/openclaw/docs/**"

  # --- SLIM: Loại openclaw và extension deps ra khỏi exe ---
  # Chúng được download dưới dạng layers từ GitHub Releases lần đầu chạy app.

  - "!node_modules/openclaw/**"
  - "!node_modules/@buape/**"
  - "!node_modules/@larksuiteoapi/**"

  # --- LOẠI BỎ PHẦN LỚN KHÔNG CẦN ---

  # Extension-level node_modules đã được hoist lên openclaw/node_modules/ bởi postinstall.
  # Không cần ship 2 bản → tiết kiệm phần lớn trong 255MB của openclaw.
  - "!node_modules/openclaw/dist/extensions/*/node_modules/**"

  # node-llama-cpp: chỉ cần engine JS, không cần prebuilt native model runners.
  # User phải cấu hình model riêng (.gguf) → không ship llama/ folder.
  - "!node_modules/node-llama-cpp/llama/**"

  # pdfjs-dist: bỏ web viewer demo, legacy build (Electron dùng V8 mới nhất),
  # sandbox worker (chỉ dùng trong browser context), và types.
  - "!node_modules/pdfjs-dist/web/**"
  - "!node_modules/pdfjs-dist/types/**"
  - "!node_modules/pdfjs-dist/legacy/**"
  - "!node_modules/pdfjs-dist/build/pdf.sandbox*"

  # playwright-core: browser không được bundle sẵn (cần playwright install riêng).
  # Chỉ giữ JS driver, bỏ thư mục browsers nếu có.
  - "!node_modules/playwright-core/.local-browsers/**"
  - "!node_modules/playwright-core/lib/server/chromium/**"
  - "!node_modules/playwright-core/lib/server/firefox/**"
  - "!node_modules/playwright-core/lib/server/webkit/**"

  # matrix-js-sdk: source TypeScript gốc (runtime dùng lib/ không dùng src/)
  # và spec/test files không cần trong production.
  - "!node_modules/matrix-js-sdk/src/**"
  - "!node_modules/matrix-js-sdk/spec/**"

  # TypeScript declarations không cần trong production binary
  - "!node_modules/**/*.d.ts"
  # Test/spec files
  - "!node_modules/**/*.test.js"
  - "!node_modules/**/*.spec.js"
  - "!node_modules/**/test/**"
  - "!node_modules/**/tests/**"
  - "!node_modules/**/__tests__/**"

  # Documentation và meta files — không bao giờ được đọc ở runtime
  - "!node_modules/**/README*"
  - "!node_modules/**/CHANGELOG*"
  - "!node_modules/**/CHANGES*"
  - "!node_modules/**/HISTORY*"
  - "!node_modules/**/NOTICE*"
  - "!node_modules/**/AUTHORS*"
  - "!node_modules/**/CONTRIBUTORS*"

  # Examples, demos, benchmarks — chỉ dùng cho dev/showcase, không cần trong binary
  - "!node_modules/**/examples/**"
  - "!node_modules/**/demo/**"
  - "!node_modules/**/demos/**"
  - "!node_modules/**/benchmark/**"
  - "!node_modules/**/benchmarks/**"
  - "!node_modules/**/fixtures/**"
  - "!node_modules/**/sample/**"
  - "!node_modules/**/samples/**"

  # Dev config artifacts bên trong node_modules — không cần ở runtime
  - "!node_modules/**/*.flow"
  - "!node_modules/**/tsconfig*.json"
  - "!node_modules/**/.eslintrc*"
  - "!node_modules/**/.eslintignore"
  - "!node_modules/**/.npmignore"
  - "!node_modules/**/.prettierrc*"
  - "!node_modules/**/jest.config*"

  # Upstream source mirror và user data không vào bundle
  - "!.openclaw-desktop-data/**"
  - "!.tmp-openclaw-upstream/**"
  - "!**/.openclaw-desktop-data/**"
  - "!**/.tmp-openclaw-upstream/**"

  # Forked Control UI (built by npm run ui:build)
  - "vendor/control-ui/**/*"

extraResources:
  - from: resources
    to: resources
    filter:
      - "**/*"

win:
  icon: assets/icon.ico
  signAndEditExecutable: true
  target:
    - target: nsis
      arch:
        - x64

portable:
  artifactName: "${productName}-Portable-${version}.${ext}"

nsis:
  installerIcon: assets/icon.ico
  uninstallerIcon: assets/icon.ico
  oneClick: false
  allowToChangeInstallationDirectory: true
  allowElevation: true
  createDesktopShortcut: always
  createStartMenuShortcut: true
  shortcutName: OpenClaw Desktop
  uninstallDisplayName: OpenClaw Desktop
  artifactName: "Openclaw-Desktop-Setup-${version}.${ext}"
