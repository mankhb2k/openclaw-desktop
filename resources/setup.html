<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'self'; style-src 'unsafe-inline'">
  <title>OpenClaw Desktop</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #0e1015; color: #e2e8f0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      height: 100vh; gap: 20px; padding: 32px;
      user-select: none;
    }
    h1 { font-size: 22px; font-weight: 600; letter-spacing: -0.3px; }
    .subtitle { font-size: 13px; color: #64748b; text-align: center; line-height: 1.6; }
    .card {
      background: #1e2330; border: 1px solid #2d3748;
      border-radius: 10px; padding: 28px 32px;
      width: 100%; max-width: 420px;
      display: flex; flex-direction: column; gap: 14px;
    }
    .bar-wrap {
      background: #2d3748; border-radius: 4px; height: 6px; overflow: hidden;
    }
    .bar {
      height: 6px; background: #22c55e; border-radius: 4px;
      width: 0%; transition: width 0.25s ease;
    }
    .bar.error { background: #f87171; }
    .status { font-size: 13px; color: #94a3b8; min-height: 18px; }
    .status.error { color: #f87171; }
    .status.ok    { color: #22c55e; }
    .actions { display: flex; gap: 10px; }
    button {
      flex: 1; padding: 10px 16px; border: none; border-radius: 6px;
      font-size: 14px; font-weight: 500; cursor: pointer;
      transition: opacity 0.15s;
    }
    button:disabled { opacity: 0.4; cursor: not-allowed; }
    #btn-download { background: #22c55e; color: #000; }
    #btn-download:not(:disabled):hover { opacity: 0.88; }
    #btn-retry { background: #334155; color: #e2e8f0; display: none; }
    #btn-retry:hover { opacity: 0.8; }
  </style>
</head>
<body>
  <h1>OpenClaw Desktop</h1>
  <p class="subtitle">
    Backend cần được tải về lần đầu (~30 MB).<br>
    Quá trình này chỉ thực hiện một lần duy nhất.
  </p>

  <div class="card">
    <div class="bar-wrap"><div id="bar" class="bar"></div></div>
    <p id="status" class="status">Sẵn sàng tải backend.</p>
    <div class="actions">
      <button id="btn-download" onclick="startDownload()">Tải backend</button>
      <button id="btn-retry"    onclick="resetUI()">Thử lại</button>
    </div>
  </div>

  <script>
    const bar         = document.getElementById('bar');
    const statusEl    = document.getElementById('status');
    const btnDownload = document.getElementById('btn-download');
    const btnRetry    = document.getElementById('btn-retry');

    const phaseLabel = {
      checking:   'Đang kiểm tra manifest...',
      downloading:'Đang tải...',
      verifying:  'Đang xác minh tính toàn vẹn...',
      extracting: 'Đang giải nén...',
      hoisting:   'Đang cấu hình extension deps...',
      swapping:   'Đang áp dụng...',
      complete:   'Hoàn tất! Đang khởi động...',
      error:      'Cài đặt thất bại.',
    };

    function startDownload() {
      btnDownload.disabled = true;
      btnRetry.style.display = 'none';
      bar.className = 'bar';
      statusEl.className = 'status';
      statusEl.textContent = 'Đang bắt đầu...';
      window.setupAPI.startDownload();
    }

    function resetUI() {
      btnDownload.disabled = false;
      btnRetry.style.display = 'none';
      bar.style.width = '0%';
      bar.className = 'bar';
      statusEl.textContent = 'Sẵn sàng tải backend.';
      statusEl.className = 'status';
    }

    window.setupAPI.onProgress((state) => {
      const pct = typeof state.progressPercent === 'number'
        ? state.progressPercent
        : state.phase === 'complete' ? 100 : 0;

      bar.style.width = pct + '%';
      statusEl.textContent = state.message || phaseLabel[state.phase] || state.phase;

      if (state.phase === 'error') {
        bar.className = 'bar error';
        statusEl.className = 'status error';
        btnDownload.disabled = false;
        btnRetry.style.display = 'block';
      } else if (state.phase === 'complete') {
        bar.style.width = '100%';
        statusEl.className = 'status ok';
      }
    });
  </script>
</body>
</html>
